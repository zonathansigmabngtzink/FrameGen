name: Build Android APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 🔥 Install Gradle 8.7 manual (BUKAN apt)
      - name: Install Gradle 8.7 manually
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      # 🔥 Generate wrapper pakai Gradle 8.7 (AMAN)
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      # (opsional debug)
      - name: Show Gradle Version
        run: ./gradlew --version

      # 🔥 Build APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Upload hasil
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrameGen-APK
          path: app/build/outputs/apk/debug/app-debug.apk